services:
  openstrmbridge:
    image: ghcr.io/chenda147/openstrmbridge:latest
    container_name: openstrmbridge
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      OPENSTRMBRIDGE_BACKEND_HOST: 0.0.0.0
      OPENSTRMBRIDGE_BACKEND_PORT: 5174
      OPENSTRMBRIDGE_DATA_DIR: /app/data
      OPENSTRMBRIDGE_WEB_DIR: /app/dist
      OPENSTRMBRIDGE_GE2O_BINARY: /app/resources/bin/ge2o
      OPENSTRMBRIDGE_BACKEND_PUBLIC_URL: ${OPENSTRMBRIDGE_BACKEND_PUBLIC_URL:-http://127.0.0.1:5174}
      OPENSTRMBRIDGE_STRM_DIR: /app/strm
      OPENSTRMBRIDGE_EMBY_MOUNT_PATH: ${OPENSTRMBRIDGE_EMBY_MOUNT_PATH:-/media/strm}
      # 以下为大规模部署优化参数
      OPENSTRMBRIDGE_SCAN_MEDIA_FILE_LIMIT: ${OPENSTRMBRIDGE_SCAN_MEDIA_FILE_LIMIT:-500000}
      OPENSTRMBRIDGE_SCAN_DIRECTORY_LIMIT: ${OPENSTRMBRIDGE_SCAN_DIRECTORY_LIMIT:-50000}
      OPENSTRMBRIDGE_STRM_INDEX_DEBOUNCE_MS: ${OPENSTRMBRIDGE_STRM_INDEX_DEBOUNCE_MS:-5000}
      OPENSTRMBRIDGE_TASKS_CACHE_TTL_MS: ${OPENSTRMBRIDGE_TASKS_CACHE_TTL_MS:-60000}
    ports:
      - '${OPENSTRMBRIDGE_PORT:-5174}:5174'
      - '${OPENSTRMBRIDGE_PROXY_PORT:-8097}:8097'
    volumes:
      - ./docker-data:/app/data
      - ./docker-strm:/app/strm
      # 使用本地存储时，将宿主机媒体目录挂载进容器并在后台选择 /media：
      # - /path/to/media:/media
      # 需要管理宿主机 Docker 中的 Emby 时，可同时挂载 Docker Socket：
      # - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - host.docker.internal:host-gateway
