# 本地构建版本的 docker-compose（不依赖 Docker Hub 镜像）
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.build.yml up -d
services:
  openstrmbridge:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 22
        GO_VERSION: 1.26
    image: openstrmbridge:local
